version: '3.9'

services:
  # Redis cache for state persistence
  redis:
    image: redis:7-alpine
    container_name: omnibus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - omnibus-network

  # OmniBus API Gateway
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnibus-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_VERSION: "1.0.0"
      OMNIBUS_HOST: "0.0.0.0"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app
      - ./web:/app/web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - omnibus-network
    restart: unless-stopped

  # Nginx reverse proxy / load balancer
  nginx:
    image: nginx:alpine
    container_name: omnibus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - omnibus-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  omnibus-network:
    driver: bridge
