    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Tournament Header */
        .tournament-header {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            position: relative;
            overflow: hidden;
            animation: gradientShift 10s infinite;
        }

        @keyframes gradientShift {
            0% { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
            50% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
            100% { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        }

        .tournament-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .tournament-prize {
            font-size: 2.5em;
            font-weight: bold;
            margin: 15px 0;
        }

        .countdown-timer {
            display: flex;
            gap: 15px;
            font-size: 1.5em;
        }

        .countdown-item {
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
        }

        /* Games Filter */
        .games-filter {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 1em;
            min-width: 250px;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .game-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.5s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .game-card.tournament {
            border: 3px solid #f6d365;
        }

        .game-card.new::after {
            content: 'NEW';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f56565;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        .game-card.hot::before {
            content: '🔥 HOT';
            position: absolute;
            top: 10px;
            left: 10px;
            background: #f6ad55;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .game-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2d3748;
        }

        .game-category {
            display: inline-block;
            padding: 5px 10px;
            background: #e2e8f0;
            border-radius: 5px;
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        .game-desc {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            color: #667eea;
            font-size: 0.9em;
            border-top: 1px solid #e2e8f0;
            padding-top: 10px;
        }

        .difficulty {
            display: flex;
            gap: 3px;
        }

        .difficulty-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e0;
        }

        .difficulty-dot.filled {
            background: #48bb78;
        }

        /* Tournament Leaderboard */
        .leaderboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .leaderboard-header {
            display: grid;
            grid-template-columns: 80px 1fr 150px 100px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .leaderboard-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 100px;
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            align-items: center;
            transition: background 0.3s;
        }

        .leaderboard-row:hover {
            background: #f7fafc;
        }

        .leaderboard-row.top-1 { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: white; }
        .leaderboard-row.top-2 { background: linear-gradient(135deg, #e2e2e2 0%, #c0c0c0 100%); }
        .leaderboard-row.top-3 { background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); color: white; }

        .rank-badge {
            font-size: 1.5em;
            font-weight: bold;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .tournament-progress {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            width: 0%;
            transition: width 0.3s;
        }

        /* Game Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .game-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .countdown-timer {
                flex-wrap: wrap;
            }
            
            .leaderboard-header, .leaderboard-row {
                grid-template-columns: 50px 1fr 100px 80px;
                font-size: 0.9em;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

        // ==================== TURNEU SĂPTĂMÂNAL ====================
        function updateTournamentTimer() {
            const endTime = new Date();
            endTime.setDate(endTime.getDate() + (7 - endTime.getDay())); // End of week
            
            const now = new Date();
            const diff = endTime - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            
            // Update progress (week progress)
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekDiff = now - weekStart;
            const weekProgress = (weekDiff / (7 * 24 * 60 * 60 * 1000)) * 100;
            document.getElementById('tournamentProgress').style.width = `${weekProgress}%`;
        }

        function searchGames(term) {
            searchTerm = term.toLowerCase();

        function applyFilters() {
            let filtered = [...games];
            
            // Filter by category
            if (currentFilter !== 'all') {
                filtered = filtered.filter(g => g.category === currentFilter);
            }
            
            // Filter by search
            if (searchTerm) {
                filtered = filtered.filter(g => 
                    g.title.toLowerCase().includes(searchTerm) || 
                    g.desc.toLowerCase().includes(searchTerm)
                );
            }
            
            renderGames(filtered);
        }
