<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBus DevTool - System Scanner & Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Fira Code', monospace;
        }

        :root {
            --bg-deep: #0a0c0f;
            --bg-card: #141a22;
            --bg-toolbar: #1a222c;
            --bg-editor: #0e1219;
            --border: #2a3545;
            --text: #e0f0ff;
            --text-dim: #8a9bb5;
            --accent-cyan: #00ffff;
            --accent-green: #00ff88;
            --accent-purple: #aa80ff;
            --accent-pink: #ff66b2;
            --accent-orange: #ffaa66;
            --success: #00cc88;
            --warning: #ffaa33;
            --error: #ff5577;
            --info: #3399ff;
            --gradient-1: linear-gradient(135deg, #00ffff, #aa80ff);
            --gradient-2: linear-gradient(135deg, #00ff88, #00ffff);
            --gradient-3: linear-gradient(135deg, #ff66b2, #aa80ff);
            --shadow: 0 8px 32px rgba(0, 255, 255, 0.15);
            --glow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        body {
            background: var(--bg-deep);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* Scrollbar personalizată */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { 
            background: var(--accent-cyan); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-green); }

        /* Layout principal */
        .devtool {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.8em;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .sidebar-header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8em;
            color: var(--text-dim);
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .sidebar-search {
            padding: 20px;
        }

        .search-box {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text);
            width: 100%;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--text-dim);
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 2px 0;
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background: rgba(0, 255, 255, 0.05);
            color: var(--accent-cyan);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: rgba(0, 255, 255, 0.1);
            color: var(--accent-cyan);
            border-left: 3px solid var(--accent-cyan);
        }

        .menu-item i {
            width: 24px;
            font-size: 1.2em;
        }

        .badge {
            margin-left: auto;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-deep);
        }

        /* Toolbar */
        .toolbar {
            height: 60px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .toolbar-group {
            display: flex;
            gap: 5px;
            padding: 0 10px;
            border-right: 1px solid var(--border);
        }

        .toolbar-group:last-child {
            border-right: none;
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            transform: scale(1.05);
        }

        .toolbar-btn.primary {
            background: var(--gradient-1);
            border: none;
            color: white;
            width: auto;
            padding: 0 15px;
            gap: 8px;
        }

        .toolbar-select {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        /* Status Bar */
        .status-bar {
            height: 30px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 25px;
            font-size: 0.8em;
            color: var(--text-dim);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-value {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        /* Workspace */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Panels */
        .panel-left {
            width: 400px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-tabs {
            display: flex;
            padding: 10px;
            gap: 5px;
            border-bottom: 1px solid var(--border);
        }

        .panel-tab {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .panel-tab:hover {
            background: rgba(0, 255, 255, 0.05);
            color: var(--accent-cyan);
        }

        .panel-tab.active {
            background: rgba(0, 255, 255, 0.1);
            color: var(--accent-cyan);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* System Scanner */
        .scanner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .scan-btn {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scan-btn:hover {
            background: var(--accent-cyan);
            color: black;
            box-shadow: var(--glow);
        }

        .component-card {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .component-card:hover {
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }

        .component-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .component-name {
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .component-version {
            font-size: 0.8em;
            padding: 3px 8px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 4px;
        }

        .component-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-ok { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-warn { background: var(--warning); box-shadow: 0 0 10px var(--warning); }
        .dot-error { background: var(--error); box-shadow: 0 0 10px var(--error); }

        /* Memory Inspector */
        .memory-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .memory-address {
            font-family: 'Fira Code', monospace;
            background: var(--bg-deep);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            color: var(--accent-green);
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .memory-cell {
            aspect-ratio: 1;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fira Code', monospace;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .memory-cell:hover {
            border-color: var(--accent-cyan);
            transform: scale(1.05);
        }

        .memory-cell.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 255, 255, 0.1);
            box-shadow: var(--glow);
        }

        /* Editor */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-editor);
        }

        .editor-tabs {
            display: flex;
            padding: 10px;
            gap: 5px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .editor-tab {
            padding: 6px 12px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .editor-tab.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 255, 255, 0.05);
        }

        .editor-tab-close {
            color: var(--text-dim);
            font-size: 1.2em;
            line-height: 1;
        }

        .editor-tab-close:hover {
            color: var(--error);
        }

        .editor-content {
            flex: 1;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg-editor);
            overflow-y: auto;
            white-space: pre-wrap;
            outline: none;
        }

        .editor-content:focus {
            box-shadow: inset 0 0 0 1px var(--accent-cyan);
        }

        .editor-line-numbers {
            font-family: 'Fira Code', monospace;
            color: var(--text-dim);
            text-align: right;
            padding-right: 15px;
            user-select: none;
        }

        /* Right Panel */
        .panel-right {
            width: 300px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Copilot */
        .copilot-container {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .copilot-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .copilot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .copilot-status {
            font-size: 0.8em;
            color: var(--text-dim);
        }

        .copilot-messages {
            height: 200px;
            overflow-y: auto;
            background: var(--bg-deep);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .copilot-message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .copilot-message.ai {
            background: rgba(0, 255, 255, 0.1);
            border-left: 3px solid var(--accent-cyan);
        }

        .copilot-message.user {
            background: rgba(170, 128, 255, 0.1);
            border-left: 3px solid var(--accent-purple);
            text-align: right;
        }

        .copilot-input {
            display: flex;
            gap: 8px;
        }

        .copilot-input input {
            flex: 1;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }

        .copilot-input input:focus {
            border-color: var(--accent-cyan);
        }

        .copilot-input button {
            background: var(--gradient-1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Monitor */
        .monitor-container {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .metric-card {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .metric-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-dim);
            font-size: 0.85em;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }

        .metric-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Graph */
        .graph-container {
            height: 100px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
        }

        .graph-bar {
            flex: 1;
            background: var(--accent-cyan);
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
            opacity: 0.7;
        }

        .graph-bar:hover {
            opacity: 1;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--accent-cyan);
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            animation: modalSlide 0.3s;
        }

        @keyframes modalSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-body {
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .panel-left { width: 350px; }
            .panel-right { width: 250px; }
        }
    </style>
</head>
<body>
    <div class="devtool">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>OMNIBUS</h1>
                <div class="status">
                    <span class="status-led"></span>
                    <span>DevTool v2.0 • Connected</span>
                </div>
            </div>
            
            <div class="sidebar-search">
                <div class="search-box">
                    <i>🔍</i>
                    <input type="text" placeholder="Search components..." id="globalSearch">
                </div>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-item active" onclick="switchView('scanner')">
                    <i>🔍</i> System Scanner
                    <span class="badge">24</span>
                </div>
                <div class="menu-item" onclick="switchView('memory')">
                    <i>🧠</i> Memory Inspector
                </div>
                <div class="menu-item" onclick="switchView('editor')">
                    <i>✏️</i> Code Editor
                </div>
                <div class="menu-item" onclick="switchView('monitor')">
                    <i>📊</i> Live Monitor
                </div>
                <div class="menu-item" onclick="switchView('versions')">
                    <i>📦</i> Version Control
                    <span class="badge">3</span>
                </div>
                <div class="menu-item" onclick="switchView('network')">
                    <i>🌐</i> Network Inspector
                </div>
                <div class="menu-item" onclick="switchView('logs')">
                    <i>📋</i> System Logs
                </div>
                <div class="menu-item" onclick="switchView('settings')">
                    <i>⚙️</i> Settings
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="toolbar-btn" onclick="executeAction('new')" title="New File">📄</button>
                    <button class="toolbar-btn" onclick="executeAction('open')" title="Open">📂</button>
                    <button class="toolbar-btn" onclick="executeAction('save')" title="Save">💾</button>
                    <button class="toolbar-btn" onclick="executeAction('saveAll')" title="Save All">💿</button>
                </div>
                
                <div class="toolbar-group">
                    <button class="toolbar-btn" onclick="executeAction('undo')" title="Undo">↩️</button>
                    <button class="toolbar-btn" onclick="executeAction('redo')" title="Redo">↪️</button>
                    <button class="toolbar-btn" onclick="executeAction('cut')" title="Cut">✂️</button>
                    <button class="toolbar-btn" onclick="executeAction('copy')" title="Copy">📋</button>
                    <button class="toolbar-btn" onclick="executeAction('paste')" title="Paste">📌</button>
                </div>
                
                <div class="toolbar-group">
                    <select class="toolbar-select" id="fileSelector">
                        <option>boot.asm</option>
                        <option>mother_os.adb</option>
                        <option>grid_os.zig</option>
                        <option>neuro_os.zig</option>
                        <option>pqc_vault.ads</option>
                    </select>
                </div>
                
                <div class="toolbar-group">
                    <button class="toolbar-btn primary" onclick="runBuild()">
                        <i>⚡</i> Build
                    </button>
                    <button class="toolbar-btn primary" onclick="runDeploy()">
                        <i>🚀</i> Deploy
                    </button>
                </div>
                
                <div style="flex:1"></div>
                
                <div class="toolbar-group">
                    <button class="toolbar-btn" onclick="showModal('search')" title="Search">🔍</button>
                    <button class="toolbar-btn" onclick="showModal('settings')" title="Settings">⚙️</button>
                    <button class="toolbar-btn" onclick="showModal('help')" title="Help">❓</button>
                </div>
            </div>
            
            <!-- Workspace -->
            <div class="workspace" id="workspace">
                <!-- Panels - dynamically loaded -->
            </div>
            
            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-item">
                    <span>CPU</span>
                    <span class="status-value" id="cpuValue">23%</span>
                </div>
                <div class="status-item">
                    <span>RAM</span>
                    <span class="status-value" id="ramValue">1.2GB</span>
                </div>
                <div class="status-item">
                    <span>NET</span>
                    <span class="status-value" id="netValue">1.4 Gbps</span>
                </div>
                <div class="status-item">
                    <span>LAT</span>
                    <span class="status-value" id="latValue">47ns</span>
                </div>
                <div class="status-item">
                    <span>MODULES</span>
                    <span class="status-value" id="modulesValue">24/24</span>
                </div>
                <div style="flex:1"></div>
                <div class="status-item">
                    <span>UTF-8</span>
                </div>
                <div class="status-item">
                    <span>Ln 24, Col 12</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Modal Title</h2>
            </div>
            <div class="modal-body" id="modalBody">
                Modal content...
            </div>
            <div class="modal-footer">
                <button class="toolbar-btn" onclick="closeModal()">Cancel</button>
                <button class="toolbar-btn primary" onclick="closeModal()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DATA MODELS
        // ============================================
        
        const components = [
            { id: 'M1', name: 'boot.asm', version: '1.2.0', status: 'ok', type: 'bootloader', ring: 0, size: '512B', path: '/boot/boot.asm' },
            { id: 'M2', name: 'stage2.asm', version: '1.2.0', status: 'ok', type: 'bootloader', ring: 0, size: '4KB', path: '/boot/stage2.asm' },
            { id: 'M3', name: 'mother_os.adb', version: '2.0.1', status: 'ok', type: 'kernel', ring: 0, size: '128KB', path: '/kernel/mother_os.adb' },
            { id: 'M4', name: 'pqc_vault.ads', version: '1.5.2', status: 'ok', type: 'security', ring: 0, size: '64KB', path: '/kernel/pqc_vault.ads' },

                            <h4 style="margin-bottom: 15px;">Top Processes</h4>
                            <table style="width:100%;">
                                <tr>
                                    <th>PID</th>
                                    <th>Name</th>
                                    <th>CPU%</th>
                                    <th>MEM</th>
                                </tr>
                                <tr><td>1</td><td>kernel</td><td>2.3%</td><td>128MB</td></tr>
                                <tr><td>12</td><td>grid_os</td><td>15.7%</td><td>96MB</td></tr>
                                <tr><td>23</td><td>neuro_os</td><td>34.2%</td><td>256MB</td></tr>
                                <tr><td>45</td><td>network</td><td>8.1%</td><td>64MB</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="panel-right">
                    <div class="copilot-container">
                        <div class="copilot-header">
                            <div class="copilot-avatar">📊</div>
                            <div>
                                <div>Monitor Copilot</div>
                                <div class="copilot-status">Analyzing...</div>
                            </div>
                        </div>
                        <div class="copilot-messages">
                            <div class="copilot-message ai">
                                CPU usage normal. Memory pressure low.
                            </div>
                            <div class="copilot-message ai">
                                Network latency: 47ns (optimal)
                            </div>
                        </div>
                    </div>
                    
                    <div class="monitor-container">
                        <h4 style="margin-bottom: 15px;">Alerts</h4>
                        <div class="metric-card" style="border-left: 3px solid var(--success);">
                            <div>✅ System healthy</div>
                            <div style="color: var(--text-dim);">2 min ago</div>
                        </div>
                        <div class="metric-card" style="border-left: 3px solid var(--warning);">
                            <div>⚠️ NeuroOS high CPU</div>
                            <div style="color: var(--text-dim);">5 min ago</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // VERSIONS VIEW
        // ============================================
        
        function renderVersionsView() {
            return `
                <div class="panel-left">
                    <div class="panel-tabs">
                        <div class="panel-tab active">Version Control</div>
                        <div class="panel-tab">History</div>
                        <div class="panel-tab">Branches</div>
                    </div>
                    <div class="panel-content">
                        <div style="margin-bottom: 20px;">
                            <button class="toolbar-btn primary" style="width:100%;" onclick="commitChanges()">
                                <i>📝</i> Commit Changes
                            </button>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <h4 style="margin-bottom: 10px;">Pending Changes</h4>
                            <div class="component-card" style="border-left: 3px solid var(--warning);">
                                <div>mother_os.adb</div>
                                <div style="color: var(--text-dim);">Modified</div>
                            </div>
                            <div class="component-card" style="border-left: 3px solid var(--success);">
                                <div>grid_os.zig</div>
                                <div style="color: var(--text-dim);">New file</div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 style="margin-bottom: 10px;">Recent Commits</h4>
                            ${versions.map(v => `
                                <div class="component-card">
                                    <div style="display: flex; justify-content: space-between;">
                                        <span style="color: var(--accent-cyan);">${v.id}</span>
                                        <span style="color: var(--text-dim);">${v.date}</span>
                                    </div>
                                    <div style="margin: 5px 0;">${v.changes}</div>
                                    <div style="color: var(--text-dim);">by ${v.author}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <div class="editor-container">
                    <div class="editor-tabs">
                        <div class="editor-tab active">Commit Details</div>
                    </div>
                    <div class="editor-content">
                        <div style="margin-bottom: 20px;">
                            <label style="color: var(--text-dim);">Commit message</label>
                            <input type="text" class="memory-address" style="width:100%; margin-top: 5px;" value="Update kernel modules">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="color: var(--text-dim);">Files changed (2)</label>
                            <div style="margin-top: 10px;">
                                <div class="component-card" style="display: flex; justify-content: space-between;">
                                    <span>mother_os.adb</span>
                                    <span style="color: var(--accent-green);">+24 -12</span>
                                </div>
                                <div class="component-card" style="display: flex; justify-content: space-between;">
                                    <span>grid_os.zig</span>
                                    <span style="color: var(--accent-green);">+47 -0</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <button class="toolbar-btn primary" onclick="showNotification('Commit successful')">
                                Commit Changes
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="panel-right">
                    <div class="copilot-container">
                        <div class="copilot-header">
                            <div class="copilot-avatar">📦</div>
                            <div>
                                <div>VCS Copilot</div>
                                <div class="copilot-status">Ready</div>
                            </div>
                        </div>
                        <div class="copilot-messages">
                            <div class="copilot-message ai">
                                2 files changed, 71 insertions, 12 deletions.
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function selectComponent(id) {
            const component = components.find(c => c.id === id);
            if (!component) return;
            
            const details = document.getElementById('componentDetails');
            if (details) {
                details.innerHTML = `
                    <h3 style="color: var(--accent-cyan); margin-bottom: 20px;">${component.name} v${component.version}</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="metric-card">
                            <div class="metric-title">ID</div>
                            <div>${component.id}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">Type</div>
                            <div>${component.type}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">Ring</div>
                            <div>${component.ring}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">Size</div>
                            <div>${component.size}</div>
                        </div>
                    </div>
                    
                    <div class="metric-card" style="margin-bottom: 20px;">
                        <div class="metric-title">Path</div>
                        <div style="font-family: 'Fira Code';">${component.path}</div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-title">Dependencies</div>
                        <div>None</div>
                    </div>
                    
                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <button class="toolbar-btn primary" onclick="openFile('${component.name}')">Open</button>
                        <button class="toolbar-btn" onclick="showNotification('Rebuilding ${component.name}')">Rebuild</button>
                        <button class="toolbar-btn" onclick="showNotification('${component.name} verified')">Verify</button>
                    </div>
                `;
            }
        }
        
        function openFile(filename) {
            showNotification(`Opening ${filename}...`);
            if (currentView !== 'editor') {
                switchView('editor');
            }
        }
        
        function scanSystem() {
            showNotification('Scanning system...');
            setTimeout(() => {
                showNotification('✅ System scan complete. 24 components found.');
            }, 2000);
        }
        
        function runBuild() {
            showNotification('Building system...');
            setTimeout(() => {
                showNotification('✅ Build successful. 24 modules compiled.');
            }, 3000);
        }
        
        function runDeploy() {
            showNotification('Deploying to cluster...');
            setTimeout(() => {
                showNotification('✅ Deployment complete. 10 nodes updated.');
            }, 4000);
        }
        
        function selectMemoryCell(index) {
            document.querySelectorAll('.memory-cell').forEach(cell => cell.classList.remove('active'));
            event.currentTarget.classList.add('active');
            showNotification(`Memory cell ${index} selected`);
        }
        
        function writeMemory() {
            showNotification('Writing to memory...');
        }
        
        function readMemory() {
            showNotification('Reading from memory...');
        }
        
        function commitChanges() {
            showNotification('Committing changes...');
        }
        
        function showNotification(message) {
            // Simple console for now
            console.log('🔔', message);
            alert(message);
        }
        
        function closeTab(event) {
            event.stopPropagation();
            event.currentTarget.parentElement.remove();
        }
        
        function showModal(type) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1);
            document.getElementById('modalBody').innerHTML = `${type} modal content would go here.`;
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function executeAction(action) {
            showNotification(`Action: ${action}`);
        }
        
        function sendCopilotMessage() {
            const input = document.getElementById('copilotInput');
            const msg = input.value;
            if (!msg) return;
            
            const messages = document.getElementById('copilotMessages');
            messages.innerHTML += `<div class="copilot-message user">${msg}</div>`;
            
            setTimeout(() => {
                messages.innerHTML += `<div class="copilot-message ai">Processing "${msg}"... I can help with that.</div>`;
                messages.scrollTop = messages.scrollHeight;
            }, 500);
            
            input.value = '';
        }
        
        // Memory canvas initialization
        function initMemoryGrid() {
            setTimeout(() => {
                const canvas = document.getElementById('memoryMapCanvas');
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    const regions = [
                        { name: 'Kernel', start: 0, end: 0x10000, color: '#ff0000' },
                        { name: 'GridOS', start: 0x10000, end: 0x30000, color: '#00ff00' },
                        { name: 'Analytics', start: 0x30000, end: 0x50000, color: '#0000ff' },
                        { name: 'Neuro', start: 0x50000, end: 0x100000, color: '#ff00ff' }
                    ];
                    
                    const width = canvas.width;
                    const maxAddr = 0x400000;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    regions.forEach(r => {
                        const x = (r.start / maxAddr) * width;
                        const w = ((r.end - r.start) / maxAddr) * width;
                        
                        ctx.fillStyle = r.color + '44';
                        ctx.fillRect(x, 0, w, canvas.height);
                        ctx.strokeStyle = r.color;
                        ctx.strokeRect(x, 0, w, canvas.height);
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '10px monospace';
                        ctx.fillText(r.name, x + 5, 20);
                    });
                }
            }, 100);
        }
        
        // Simulate monitoring updates
        function startMonitoring() {
            setInterval(() => {
                document.getElementById('cpuValue').innerText = Math.floor(Math.random() * 40 + 10) + '%';
                document.getElementById('ramValue').innerText = (Math.random() * 2 + 0.5).toFixed(1) + 'GB';
                document.getElementById('netValue').innerText = (Math.random() * 2 + 0.8).toFixed(1) + ' Gbps';
                
                // Update graph if present
                const graph = document.getElementById('quickGraph');
                if (graph) {
                    graph.innerHTML = Array(20).fill(0).map(() => {
                        const height = Math.floor(Math.random() * 60) + 20;
                        return `<div class="graph-bar" style="height: ${height}px;"></div>`;
                    }).join('');
                }
            }, 2000);
        }
        
        // Initialize
        window.onload = function() {
            renderWorkspace();
        };
    </script>
</body>
