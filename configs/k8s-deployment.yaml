---
# Kubernetes namespace for OmniBus
apiVersion: v1
kind: Namespace
metadata:
  name: omnibus-production
  labels:
    name: omnibus-production

---
# ConfigMap for API configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: omnibus-api-config
  namespace: omnibus-production
data:
  API_VERSION: "1.0.0"
  OMNIBUS_HOST: "0.0.0.0"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

---
# Redis StatefulSet for persistent cache
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: omnibus-production
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: omnibus-production
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# OmniBus API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnibus-api
  namespace: omnibus-production
  labels:
    app: omnibus-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: omnibus-api
  template:
    metadata:
      labels:
        app: omnibus-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: omnibus-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: omnibus-api
        image: omnibus-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: omnibus-api-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - omnibus-api
              topologyKey: kubernetes.io/hostname

      volumes:
      - name: tmp
        emptyDir: {}

---
# OmniBus API Service
apiVersion: v1
kind: Service
metadata:
  name: omnibus-api-service
  namespace: omnibus-production
  labels:
    app: omnibus-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: omnibus-api

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnibus-api-hpa
  namespace: omnibus-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnibus-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omnibus-ingress
  namespace: omnibus-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/websocket-services: omnibus-api-service
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
  - hosts:
    - api.omnibus.trading
    secretName: omnibus-tls
  rules:
  - host: api.omnibus.trading
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: omnibus-api-service
            port:
              number: 8000

---
# ServiceAccount for API pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnibus-api
  namespace: omnibus-production

---
# Role for API pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: omnibus-api-role
  namespace: omnibus-production
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding for API pods
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: omnibus-api-rolebinding
  namespace: omnibus-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: omnibus-api-role
subjects:
- kind: ServiceAccount
  name: omnibus-api
  namespace: omnibus-production
