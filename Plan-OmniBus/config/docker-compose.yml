version: '3.8'

services:
  # Redis for distributed state
  redis:
    image: redis:7-alpine
    container_name: omnibus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (Single instance for development)
  api-gateway:
    build:
      context: ../../
      dockerfile: Plan-OmniBus/config/Dockerfile
    container_name: omnibus-api-gateway
    ports:
      - "8001:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OMNIBUS_HOST: host.docker.internal
      OMNIBUS_PORT: 9000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../services:/app
    command: python -m uvicorn omnibus_api_gateway:app --host 0.0.0.0 --port 8000 --reload

  # Nginx Load Balancer (for testing horizontal scaling)
  nginx:
    image: nginx:alpine
    container_name: omnibus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:

networks:
  default:
    name: omnibus-network
