<div class="space-y-2">
    <div class="flex justify-between items-center border-b border-omnibus-accent pb-2">
        <h2 class="text-lg font-bold text-omnibus-accent">❤️ HEALTH</h2>
        <span class="text-xs text-gray-400">OS Integrity</span>
    </div>

    <!-- Checksum OS -->
    <div class="p-2 bg-black rounded border-l-2 border-omnibus-success">
        <div class="text-xs font-bold text-omnibus-success mb-1">CHECKSUM OS</div>
        <div class="flex justify-between text-xs">
            <span class="text-gray-400">Status</span>
            <span class="text-omnibus-success">✓ Valid</span>
        </div>
        <div class="flex justify-between text-xs mt-1">
            <span class="text-gray-400">Last Check</span>
            <span class="text-gray-300" id="checksum-time">Just now</span>
        </div>
    </div>

    <!-- AutoRepair OS -->
    <div class="p-2 bg-black rounded border-l-2 border-omnibus-success">
        <div class="text-xs font-bold text-omnibus-success mb-1">AUTOREPAIR OS</div>
        <div class="flex justify-between text-xs">
            <span class="text-gray-400">Repairs</span>
            <span class="font-bold text-omnibus-accent">0</span>
        </div>
        <div class="flex justify-between text-xs mt-1">
            <span class="text-gray-400">Failures</span>
            <span class="font-bold text-omnibus-success">0</span>
        </div>
    </div>

    <!-- Overall Status -->
    <div class="p-3 bg-black rounded border-2 border-omnibus-success">
        <div class="text-sm font-bold text-omnibus-success">
            ✓ All Systems Operational
        </div>
        <div class="text-xs text-gray-400 mt-1">
            Uptime: <span id="uptime">0m</span>
        </div>
    </div>
</div>

<script>
    let startTime = Date.now();
    function updateUptime() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        document.getElementById('uptime').textContent =
            mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
    }
    setInterval(updateUptime, 1000);

    // Update checksum time
    function updateChecksumTime() {
        const now = new Date();
        document.getElementById('checksum-time').textContent = now.toLocaleTimeString();
    }
    updateChecksumTime();
    setInterval(updateChecksumTime, 5000);
</script>
