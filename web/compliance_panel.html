<div class="space-y-3">
    <div class="flex justify-between items-center border-b border-omnibus-accent pb-2">
        <h2 class="text-lg font-bold text-omnibus-accent">🔐 COMPLIANCE</h2>
        <span class="text-xs text-gray-400">Zorin OS</span>
    </div>

    <div class="space-y-2">
        <!-- Access Control Status -->
        <div class="flex justify-between items-center p-2 bg-black rounded">
            <span class="text-sm">ACL Status</span>
            <span class="font-bold text-omnibus-success">✓ ENFORCED</span>
        </div>

        <!-- Zone Indicators -->
        <div class="grid grid-cols-2 gap-2">
            <div class="p-2 bg-black rounded border-l-2 border-blue-500">
                <div class="text-xs text-gray-400">London</div>
                <div class="text-lg font-bold text-blue-400">🇬🇧</div>
            </div>
            <div class="p-2 bg-black rounded border-l-2 border-purple-500">
                <div class="text-xs text-gray-400">Frankfurt</div>
                <div class="text-lg font-bold text-purple-400">🇩🇪</div>
            </div>
            <div class="p-2 bg-black rounded border-l-2 border-red-500">
                <div class="text-xs text-gray-400">New York</div>
                <div class="text-lg font-bold text-red-400">🇺🇸</div>
            </div>
            <div class="p-2 bg-black rounded border-l-2 border-yellow-500">
                <div class="text-xs text-gray-400">Tokyo</div>
                <div class="text-lg font-bold text-yellow-400">🇯🇵</div>
            </div>
        </div>

        <!-- Violation Alert -->
        <div class="p-2 bg-black rounded border border-gray-600">
            <div class="flex justify-between items-center">
                <span class="text-sm">Violations</span>
                <span class="text-lg font-bold text-omnibus-success">0</span>
            </div>
        </div>

        <!-- Permission Levels -->
        <div class="text-xs space-y-1 p-2 bg-black rounded">
            <div class="flex justify-between">
                <span class="text-gray-400">Read</span>
                <span class="text-omnibus-success font-bold">✓ Allowed</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">Write</span>
                <span class="text-omnibus-success font-bold">✓ Allowed</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">Execute</span>
                <span class="text-omnibus-success font-bold">✓ Allowed</span>
            </div>
        </div>

        <!-- Last Audit -->
        <div class="p-2 bg-black rounded text-xs text-gray-400">
            <div>Last Audit: <span id="audit-time">Just now</span></div>
        </div>
    </div>
</div>

<script>
    // Update audit time
    function updateAuditTime() {
        const now = new Date();
        document.getElementById('audit-time').textContent = now.toLocaleTimeString();
    }
    updateAuditTime();
    setInterval(updateAuditTime, 1000);
</script>
