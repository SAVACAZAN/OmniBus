<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBus Market Profile (ExoGridChart Integration)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #1e3a8a;
            padding-bottom: 15px;
        }
        .header h1 {
            font-size: 24px;
            color: #60a5fa;
            margin-bottom: 5px;
        }
        .status {
            font-size: 12px;
            color: #10b981;
        }
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: #111827;
            border: 1px solid #1e3a8a;
            border-radius: 8px;
            padding: 20px;
        }
        .panel h2 {
            font-size: 14px;
            color: #60a5fa;
            margin-bottom: 15px;
            border-bottom: 1px solid #1e3a8a;
            padding-bottom: 10px;
        }
        .ohlcv-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 11px;
        }
        .ohlcv-label {
            color: #9ca3af;
            font-weight: bold;
        }
        .ohlcv-value {
            color: #10b981;
            text-align: right;
        }
        .canvas-container {
            background: #1a202c;
            border: 1px solid #1e3a8a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        canvas {
            display: block;
            width: 100%;
            border-radius: 4px;
        }
        .market-profile {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .profile-labels {
            font-size: 10px;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .profile-label {
            height: 12px;
            line-height: 12px;
            text-align: right;
            padding-right: 8px;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(30, 1fr);
            gap: 1px;
        }
        .profile-cell {
            width: 100%;
            aspect-ratio: 1;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 2px;
            transition: background 0.2s;
        }
        .profile-cell:hover {
            background: #2d3748;
            cursor: pointer;
        }
        .profile-cell.hot {
            background: #dc2626;
        }
        .profile-cell.warm {
            background: #f97316;
        }
        .profile-cell.cool {
            background: #3b82f6;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 11px;
        }
        .stat-item {
            background: #1a202c;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #60a5fa;
        }
        .stat-label {
            color: #9ca3af;
            font-size: 10px;
        }
        .stat-value {
            color: #10b981;
            font-weight: bold;
            font-size: 12px;
            margin-top: 3px;
        }
        .exchange-stats {
            margin-top: 20px;
            font-size: 10px;
        }
        .exchange-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 1fr;
            gap: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #1e3a8a;
        }
        .exchange-row:first-child {
            font-weight: bold;
            color: #60a5fa;
        }
        .exchange-col {
            text-align: right;
            color: #e0e0e0;
        }
        .error {
            color: #ef4444;
        }
        .success {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ OmniBus Market Profile Dashboard</h1>
            <p class="status" id="status">Connecting...</p>
        </div>

        <div class="panels">
            <!-- BTC Panel -->
            <div class="panel">
                <h2>BTC/USD</h2>
                <div id="btc-ohlcv" class="ohlcv-display"></div>
                <div id="btc-stats" class="stats-grid"></div>
                <div id="btc-exchanges" class="exchange-stats"></div>
            </div>

            <!-- ETH Panel -->
            <div class="panel">
                <h2>ETH/USD</h2>
                <div id="eth-ohlcv" class="ohlcv-display"></div>
                <div id="eth-stats" class="stats-grid"></div>
                <div id="eth-exchanges" class="exchange-stats"></div>
            </div>

            <!-- LCX Panel -->
            <div class="panel">
                <h2>LCX/USD</h2>
                <div id="lcx-ohlcv" class="ohlcv-display"></div>
                <div id="lcx-stats" class="stats-grid"></div>
                <div id="lcx-exchanges" class="exchange-stats"></div>
            </div>
        </div>

        <!-- Market Profile Visualization -->
        <div class="panel">
            <h2>Market Profile Heatmap (Last 30 Minutes)</h2>
            <div class="canvas-container">
                <canvas id="marketProfileCanvas" width="1200" height="400"></canvas>
            </div>
        </div>

        <!-- Price-Time Grid -->
        <div class="panel">
            <h2>Price × Time Activity Grid</h2>
            <div class="market-profile" id="profileGrid"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let ohlcvData = {
            btc: { candles: [] },
            eth: { candles: [] },
            lcx: { candles: [] }
        };

        // Initialize
        async function init() {
            updateStatus('Loading market data...', false);
            await fetchOHLCV();
            setInterval(fetchOHLCV, 1000);
        }

        // Fetch OHLCV from API
        async function fetchOHLCV() {
            try {
                const [btc, eth, lcx] = await Promise.all([
                    fetch(`${API_BASE}/api/ohlcv/btc`).then(r => r.json()),
                    fetch(`${API_BASE}/api/ohlcv/eth`).then(r => r.json()),
                    fetch(`${API_BASE}/api/ohlcv/lcx`).then(r => r.json()),
                ]);

                ohlcvData.btc = btc;
                ohlcvData.eth = eth;
                ohlcvData.lcx = lcx;

                renderPanels();
                updateStatus('Connected: Market Profile Active', true);
            } catch (e) {
                updateStatus(`Error: ${e.message}`, false);
            }
        }

        // Render individual panels
        function renderPanels() {
            renderOHLCVPanel('btc');
            renderOHLCVPanel('eth');
            renderOHLCVPanel('lcx');
            renderMarketProfile();
        }

        // Render OHLCV panel
        function renderOHLCVPanel(pair) {
            const data = ohlcvData[pair];
            if (!data || !data.candles) return;

            const latest = data.candles[data.candles.length - 1] || {};
            const html = `
                <div class="ohlcv-row">
                    <div><span class="ohlcv-label">O:</span> <span class="ohlcv-value">${(latest.open || 0).toFixed(2)}</span></div>
                    <div><span class="ohlcv-label">H:</span> <span class="ohlcv-value">${(latest.high || 0).toFixed(2)}</span></div>
                    <div><span class="ohlcv-label">L:</span> <span class="ohlcv-value">${(latest.low || 0).toFixed(2)}</span></div>
                    <div><span class="ohlcv-label">C:</span> <span class="ohlcv-value">${(latest.close || 0).toFixed(2)}</span></div>
                    <div><span class="ohlcv-label">V:</span> <span class="ohlcv-value">${(latest.volume || 0).toLocaleString()}</span></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Total Candles</div>
                        <div class="stat-value">${data.candles.length}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Total Volume</div>
                        <div class="stat-value">${(data.candles.reduce((s, c) => s + (c.volume || 0), 0)).toLocaleString()}</div>
                    </div>
                </div>
            `;
            document.getElementById(`${pair}-ohlcv`).innerHTML = html;
            document.getElementById(`${pair}-stats`).innerHTML = '';
        }

        // Render market profile heatmap
        function renderMarketProfile() {
            const canvas = document.getElementById('marketProfileCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines and labels
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#9ca3af';
            ctx.font = '10px Monaco';

            // Time axis (30 buckets)
            for (let i = 0; i <= 30; i++) {
                const x = (canvas.width / 30) * i;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 40);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
                if (i % 5 === 0) {
                    ctx.fillText(`${i}m`, x - 10, canvas.height - 20);
                }
            }

            // Price axis (32 levels)
            ctx.fillStyle = '#9ca3af';
            for (let i = 0; i <= 8; i++) {
                const y = (canvas.height - 40) * (1 - i / 8);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
                ctx.fillText(`L${i}`, 5, y + 5);
            }

            // Draw sample heatmap
            drawHeatmapBars(ctx, canvas);
        }

        // Draw heatmap bars
        function drawHeatmapBars(ctx, canvas) {
            const btcData = ohlcvData.btc.candles || [];
            const cellWidth = canvas.width / 30;
            const cellHeight = (canvas.height - 40) / 32;

            for (let t = 0; t < Math.min(30, btcData.length); t++) {
                const bucket = btcData[t];
                if (!bucket || !bucket.volume) continue;

                const volume = bucket.volume;
                const intensity = Math.min(volume / 100000, 1); // Normalize

                // Color gradient: blue → orange → red
                let color;
                if (intensity < 0.33) {
                    color = `rgba(59, 130, 246, ${intensity * 3})`; // Blue
                } else if (intensity < 0.66) {
                    color = `rgba(249, 115, 22, ${(intensity - 0.33) * 3})`; // Orange
                } else {
                    color = `rgba(220, 38, 38, ${(intensity - 0.66) * 3})`; // Red
                }

                // Draw bar for this time bucket
                const x = t * cellWidth;
                const barHeight = cellHeight * 16 * intensity;
                const y = canvas.height - 40 - barHeight;

                ctx.fillStyle = color;
                ctx.fillRect(x, y, cellWidth - 1, barHeight);
            }
        }

        // Update status indicator
        function updateStatus(msg, isOk) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = isOk ? 'status success' : 'status error';
        }

        // Start
        init();
    </script>
</body>
</html>
